<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .heading { font-weight: 600; fill: #383B5B; }
    .body { fill: #7a7a8e; }
    .light { fill: #a0a0b4; }
    .nav-text { fill: #7a7a8e; font-size: 7.5px; }
    .nav-active { fill: #383B5B; font-weight: 600; font-size: 7.5px; }
    .tag-text { fill: #383B5B; font-size: 6.5px; font-weight: 500; }
    .card-title { fill: #383B5B; font-weight: 600; font-size: 8px; }
    .card-body { fill: #8a8a9e; font-size: 7px; }
    .small-tag { fill: #7a7a8e; font-size: 6px; }
  </style>

  <!-- Background -->
  <rect width="580" height="420" rx="12" fill="#f5f5fa"/>

  <!-- Top nav bar -->
  <rect x="16" y="12" width="548" height="36" rx="8" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="30" y="35" class="heading" font-size="11">GoodbyeYou</text>
  <text x="410" y="34" class="light" font-size="7.5">When You Have Time</text>
  <text x="496" y="34" class="light" font-size="7.5">When Time Has Run Out</text>

  <!-- Sidebar -->
  <rect x="16" y="58" width="156" height="346" rx="8" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>

  <!-- Sidebar title -->
  <text x="30" y="78" class="heading" font-size="11">Illinois</text>
  <text x="30" y="92" class="body" font-size="6.5">Explore available options, state</text>
  <text x="30" y="101" class="body" font-size="6.5">regulations, and local providers.</text>

  <!-- Sidebar nav -->
  <rect x="24" y="114" width="140" height="24" rx="5" fill="#eeeef6"/>
  <text x="34" y="130" class="nav-active">Uncommon Service Menu</text>

  <text x="34" y="152" class="nav-text">Explore Options</text>
  <text x="34" y="170" class="nav-text">Provider Directory</text>
  <text x="34" y="188" class="nav-text">Cost Estimates</text>
  <text x="34" y="206" class="nav-text">Future Logistics</text>

  <!-- Sidebar tags -->
  <rect x="28" y="224" width="132" height="1" fill="#e0e0ea"/>
  <rect x="28" y="234" width="58" height="16" rx="8" fill="#eeeef6"/>
  <text x="38" y="245" class="small-tag">Home funeral</text>
  <rect x="92" y="234" width="58" height="16" rx="8" fill="#eeeef6"/>
  <text x="100" y="245" class="small-tag">Green burial</text>
  <rect x="28" y="256" width="56" height="16" rx="8" fill="#eeeef6"/>
  <text x="36" y="267" class="small-tag">Documents</text>

  <!-- Main content -->
  <!-- Section 1 title -->
  <text x="190" y="78" class="heading" font-size="11">Availability: Uncommon Service Menu</text>

  <!-- Tag bar -->
  <rect x="188" y="90" width="376" height="32" rx="7" fill="#eeeef6"/>
  <rect x="198" y="97" width="72" height="18" rx="5" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="213" y="110" class="tag-text">Legal Status</text>
  <rect x="280" y="97" width="108" height="18" rx="5" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="293" y="110" class="tag-text">Status of Legislation</text>

  <!-- Card 1 -->
  <rect x="188" y="134" width="182" height="110" rx="8" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="202" y="154" class="card-title">Legal Status</text>
  <text x="202" y="170" class="card-body">Home funeral, green burial, and</text>
  <text x="202" y="181" class="card-body">aquamation are authorized in</text>
  <text x="202" y="192" class="card-body">Illinois. Whole-body donation is</text>
  <text x="202" y="203" class="card-body">available through approved</text>
  <text x="202" y="214" class="card-body">facilities.</text>

  <!-- Card 2 -->
  <rect x="382" y="134" width="182" height="110" rx="8" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="396" y="154" class="card-title">Status of Legislation</text>
  <text x="396" y="170" class="card-body">No pending legislation restricting</text>
  <text x="396" y="181" class="card-body">current alternative options. Illinois</text>
  <text x="396" y="192" class="card-body">permits family-directed disposition</text>
  <text x="396" y="203" class="card-body">with proper documentation.</text>

  <!-- Section 2 title -->
  <text x="190" y="270" class="heading" font-size="11">Explore Options: How it Works</text>

  <!-- Card 3 -->
  <rect x="188" y="284" width="182" height="100" rx="8" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="202" y="304" class="card-title">Method Deep Dives</text>
  <text x="202" y="320" class="card-body">Links to technical descriptions of</text>
  <text x="202" y="331" class="card-body">home funeral care, green burial,</text>
  <text x="202" y="342" class="card-body">aquamation processing, and</text>
  <text x="202" y="353" class="card-body">whole-body donation programs.</text>

  <!-- Card 4 -->
  <rect x="382" y="284" width="182" height="100" rx="8" fill="#fff" stroke="#e0e0ea" stroke-width="1"/>
  <text x="396" y="304" class="card-title">Environmental Impact</text>
  <text x="396" y="320" class="card-body">Comparative data on footprint,</text>
  <text x="396" y="331" class="card-body">space requirements, and processing</text>
  <text x="396" y="342" class="card-body">timelines for each method.</text>
</svg>
